<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CallTrack CRM</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      input, select, textarea, button {
        font-family: inherit;
        font-size: 14px;
        outline: none;
        border-radius: 8px;
        border: 0.5px solid #2a2f3d;
        padding: 8px 10px;
        background: #181c24;
        color: #e8eaf0;
      }
      button { cursor: pointer; }
      input[type="file"] { border: none; background: transparent; padding: 0; color: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
